name: Daily Tech News Briefing

on:
  schedule:
    - cron: '30 00 * * *'
  workflow_dispatch:

jobs:
  send_briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser groq

      - name: Run briefing script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_RECEIVER2: ${{ secrets.GMAIL_RECEIVER2 }}
          GMAIL_RECEIVER3: ${{ secrets.GMAIL_RECEIVER3 }}
        run: python briefing.py
